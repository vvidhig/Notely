services:
  - type: web
    name: notely-backend
    runtime: python
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: notely-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_MINUTES
        value: "1440"
      - key: GROQ_API_KEY
        sync: false
      - key: NOTION_CLIENT_ID
        sync: false
      - key: NOTION_CLIENT_SECRET
        sync: false
      - key: NOTION_REDIRECT_URI
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: AUTO_SUGGEST_THRESHOLD
        value: "3"
      - key: DATABASE_URL
        value: sqlite:////data/notely.db
